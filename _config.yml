# 网站设置
title: Hulu204's Blog
description: 我的个人技术博客
author: hulu204
email: your-email@example.com

# GitHub Pages 设置
baseurl: ""
url: "https://hulu204.github.io"

# 主题设置 - 使用 Hacker 主题（简洁、代码友好）
remote_theme: pages-themes/hacker@v0.2.0

# 构建设置
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# 显示设置
show_excerpts: true

# 代码高亮主题
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
