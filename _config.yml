# 网站设置
title: Hulu204's Blog
description: 我的个人技术博客
author:
  name: hulu204
  email: your-email@example.com
  bio: "Java 开发者，专注于并发编程和性能优化"
  avatar: # 可选：头像图片路径
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hulu204"

# GitHub Pages 设置
baseurl: ""
url: "https://hulu204.github.io"

# 主题设置
remote_theme: mmistakes/minimal-mistakes

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

# 分页设置
paginate: 5
paginate_path: /page:num/

# 显示设置
show_excerpts: true

# Minimal Mistakes 主题配置
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# 默认配置
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      toc: true
      toc_sticky: true
